<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjetas de producto</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

        <img src="img/pngtree-cartoon-rooster-illustration-clip-art-graphic-png-image_17085758.png" alt="Figura de gallo decorativo">
        <p>Figura de gallo.</p>
        <span class="precio">$20.000</span>
        <button>Comprar</button>
    </div>

    <div class="card">
        <h2>Gallo premium</h2>
        <img src="img/pngtree-cartoon-rooster-illustration-clip-art-graphic-png-image_17085758.png" alt="Gallo de alta calidad">
        <p>Gallo de alta calidad.</p>
        <span class="precio">$34.000</span>
        <button>Comprar</button>
    </div>

    <div class="card">
        <h2>Mini gallo</h2>
        <img src="img/pngtree-cartoon-rooster-illustration-clip-art-graphic-png-image_17085758.png" alt="Mini gallo decorativo">
